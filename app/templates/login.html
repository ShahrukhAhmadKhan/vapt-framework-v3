<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VAPT-Framework v3 — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#03050a; --bg1:#070b11; --bg2:#0b1219; --bg3:#101822;
  --accent:#00d4ff; --purple:#7b2fff; --red:#ff3e6c; --green:#00ff9d;
  --text:#b8cce0; --dim:#4a6a8a; --border:rgba(0,212,255,0.12);
  --mono:'Space Mono',monospace; --ui:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--ui); background:var(--bg0); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 2px,
      rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);
}
.glow-orb {
  position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none;
}
.glow-orb.a{width:400px;height:400px;background:rgba(123,47,255,0.15);top:-100px;left:-100px;}
.glow-orb.b{width:300px;height:300px;background:rgba(0,212,255,0.10);bottom:-50px;right:-50px;}

.login-card {
  background:var(--bg1); border:1px solid var(--border);
  border-radius:16px; padding:40px 36px; width:100%; max-width:420px;
  position:relative; z-index:1;
  box-shadow:0 0 60px rgba(0,212,255,0.08);
  animation:slideIn .4s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.brand {
  text-align:center; margin-bottom:32px;
}
.brand-icon {
  width:52px;height:52px; border-radius:12px; margin:0 auto 12px;
  background:linear-gradient(135deg,var(--purple),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:24px; box-shadow:0 0 24px rgba(123,47,255,0.4);
}
.brand-name {font-weight:800;font-size:20px;color:#fff;letter-spacing:1px;}
.brand-ver  {font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;}

.step{display:none}
.step.active{display:block}

label {
  display:block; margin-bottom:6px;
  font-size:10px; font-family:var(--mono); color:var(--dim);
  letter-spacing:1.5px; text-transform:uppercase;
}
input[type=text],input[type=password] {
  width:100%; padding:10px 13px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:var(--text);
  font-family:var(--mono); font-size:13px; outline:none;
  transition:border-color .18s, box-shadow .18s;
  margin-bottom:16px;
}
input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,212,255,0.08);
}
input::placeholder{color:var(--dim);}

.btn-login {
  width:100%; padding:12px; border-radius:8px; border:none;
  background:linear-gradient(135deg,var(--purple),var(--accent));
  color:#fff; font-family:var(--ui); font-weight:700; font-size:14px;
  cursor:pointer; transition:all .18s; margin-top:4px;
  box-shadow:0 0 20px rgba(0,212,255,0.2);
}
.btn-login:hover{box-shadow:0 0 32px rgba(0,212,255,0.35);transform:translateY(-1px);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.error-box {
  background:rgba(255,62,108,0.1); border:1px solid rgba(255,62,108,0.25);
  border-radius:8px; padding:10px 13px; margin-bottom:16px;
  font-size:12px; color:#ff3e6c; display:none;
}
.error-box.show{display:block;}

.mfa-info {
  background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.15);
  border-radius:8px; padding:12px 13px; margin-bottom:16px;
  font-size:12px; color:var(--text);
}
.mfa-digits {
  display:flex; gap:8px; justify-content:center; margin-bottom:16px;
}
.mfa-digit {
  width:44px; height:52px; text-align:center;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:#fff; font-size:22px; font-weight:700;
  font-family:var(--mono); outline:none;
  transition:border-color .18s;
}
.mfa-digit:focus{border-color:var(--accent);}

.back-link {
  text-align:center; margin-top:16px;
  font-size:12px; color:var(--dim);
}
.back-link a{color:var(--accent);cursor:pointer;text-decoration:none;}
.back-link a:hover{text-decoration:underline;}

.loading-ring {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(255,255,255,0.3); border-top-color:#fff;
  border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="glow-orb a"></div>
<div class="glow-orb b"></div>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div class="brand-name">VAPT-FRAMEWORK</div>
    <div class="brand-ver">v3.0 — SECURE ACCESS</div>
  </div>

  <div class="error-box" id="err"></div>

  <!-- Step 1: Username + Password -->
  <div class="step active" id="step1">
    <div>
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" autofocus>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>

  <!-- Step 2: MFA -->
  <div class="step" id="step2">
    <div class="mfa-info">
      🔐 Enter the 6-digit code from your authenticator app
    </div>
    <div class="mfa-digits">
      <input class="mfa-digit" id="d0" maxlength="1" oninput="mfaInput(0)" onkeydown="mfaKey(event,0)">
      <input class="mfa-digit" id="d1" maxlength="1" oninput="mfaInput(1)" onkeydown="mfaKey(event,1)">
      <input class="mfa-digit" id="d2" maxlength="1" oninput="mfaInput(2)" onkeydown="mfaKey(event,2)">
      <input class="mfa-digit" id="d3" maxlength="1" oninput="mfaInput(3)" onkeydown="mfaKey(event,3)">
      <input class="mfa-digit" id="d4" maxlength="1" oninput="mfaInput(4)" onkeydown="mfaKey(event,4)">
      <input class="mfa-digit" id="d5" maxlength="1" oninput="mfaInput(5)" onkeydown="mfaKey(event,5)">
    </div>
    <button class="btn-login" id="mfa-btn" onclick="doMFA()">Verify</button>
    <div class="back-link"><a onclick="backToLogin()">← Back to login</a></div>
  </div>
</div>

<script>
let _username = '', _password = '';

async function doLogin() {
  const btn  = document.getElementById('login-btn');
  _username  = document.getElementById('username').value.trim();
  _password  = document.getElementById('password').value;
  if (!_username || !_password) { showErr('Enter username and password'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading-ring"></span> Signing in…';
  hideErr();

  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:_username, password:_password})
    });
    const d = await r.json();

    if (d.mfa_required) {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('d0').focus();
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      return;
    }

    if (d.token) {
      localStorage.setItem('vapt_token', d.token);
      window.location.href = '/';
      return;
    }

    showErr(d.error || 'Login failed');
  } catch(e) {
    showErr('Connection error: ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = 'Sign In';
}

async function doMFA() {
  const code = [0,1,2,3,4,5].map(i => document.getElementById('d'+i).value).join('');
  if (code.length < 6) { showErr('Enter all 6 digits'); return; }

  const btn = document.getElementById('mfa-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-ring"></span>';

  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:_username, password:_password, totp_code:code})
    });
    const d = await r.json();
    if (d.token) {
      localStorage.setItem('vapt_token', d.token);
      window.location.href = '/';
      return;
    }
    showErr(d.error || 'Invalid MFA code');
    [0,1,2,3,4,5].forEach(i => document.getElementById('d'+i).value = '');
    document.getElementById('d0').focus();
  } catch(e) {
    showErr('Connection error');
  }
  btn.disabled = false;
  btn.innerHTML = 'Verify';
}

function mfaInput(i) {
  const v = document.getElementById('d'+i).value;
  if (v && i < 5) document.getElementById('d'+(i+1)).focus();
  if (i === 5 && v) doMFA();
}
function mfaKey(e, i) {
  if (e.key==='Backspace' && !document.getElementById('d'+i).value && i > 0)
    document.getElementById('d'+(i-1)).focus();
  if (e.key==='ArrowLeft' && i > 0) document.getElementById('d'+(i-1)).focus();
  if (e.key==='ArrowRight' && i < 5) document.getElementById('d'+(i+1)).focus();
}

// Paste support for MFA code
document.addEventListener('paste', e => {
  const d0 = document.getElementById('d0');
  if (!d0 || !document.getElementById('step2').classList.contains('active')) return;
  const text = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
  [...text.slice(0,6)].forEach((c,i) => {
    const el = document.getElementById('d'+i);
    if (el) el.value = c;
  });
  e.preventDefault();
  if (text.length >= 6) doMFA();
});

function backToLogin() {
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  hideErr();
}
function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}
function hideErr() {
  document.getElementById('err').classList.remove('show');
}

// If already logged in, redirect
const t = localStorage.getItem('vapt_token');
if (t) {
  fetch('/api/auth/verify', {headers:{'X-Token':t}})
    .then(r=>r.json()).then(d=>{ if(d.valid) window.location.href='/'; })
    .catch(()=>{});
}
</script>
</body>
</html>
